services:
  db:
    image: postgres:16-alpine
    container_name: time-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: time
      POSTGRES_USER: time
      POSTGRES_PASSWORD: time
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U time -d time"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
